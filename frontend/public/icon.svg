<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #1a1a2e; }
      .gate { fill: #a855f7; }
      .accent { fill: #22d3ee; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f0f1a; }
      .gate { fill: #a855f7; }
      .accent { fill: #22d3ee; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37"/>
  <!-- Torii Gate -->
  <g transform="translate(90,90) scale(0.85)" style="transform-origin: center">
    <!-- Top beam (kasagi) - curved -->
    <path class="gate" d="M-55,-45 L-60,-40 L60,-40 L55,-45 Z"/>
    <!-- Second beam (nuki) -->
    <rect class="gate" x="-48" y="-32" width="96" height="8" rx="2"/>
    <!-- Left pillar -->
    <rect class="gate" x="-42" y="-32" width="10" height="90" rx="2"/>
    <!-- Right pillar -->
    <rect class="gate" x="32" y="-32" width="10" height="90" rx="2"/>
    <!-- Chevron accent -->
    <path class="accent" d="M-5,5 L0,-5 L5,5" stroke-width="3" fill="none" stroke="#22d3ee"/>
    <path class="accent" d="M-5,12 L0,2 L5,12" stroke-width="2.5" fill="none" stroke="#22d3ee" opacity="0.6"/>
  </g>
</svg>